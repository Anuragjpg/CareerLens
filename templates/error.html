{% extends "base.html" %}

{% block content %}
<section class="error-section">
  <div class="container-narrow">
    <div class="error-card fade-in">
      <div class="error-icon" aria-hidden="true">&#x26A0;</div>
      <p class="eyebrow" style="margin-left:auto;margin-right:auto">Something went wrong</p>
      <h1>We could not complete the request.</h1>

      <div class="warning-box">
        {{ error }}
      </div>

      <a href="{{ url_for('home') }}" class="back-link">Go back home</a>
    </div>
  </div>
</section>
{% endblock %}
