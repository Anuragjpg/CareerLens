<!-- Small newsletter/contact form component -->
<form action="/subscribe" method="post" class="card" role="form">
  <label class="kicker" for="email">Stay updated</label>
  <div class="mt-1 form-row">
    <input class="input" id="email" name="email" type="email" placeholder="you@company.com" required>
    <button class="btn btn-primary" type="submit">Subscribe</button>
  </div>
</form>
