<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120" fill="none">
  <!-- Lens Icon -->
  <defs>
    <linearGradient id="lensGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main Lens Circle -->
  <circle cx="58" cy="60" r="38" fill="none" stroke="url(#lensGradient)" stroke-width="12" filter="url(#glow)"/>
  <!-- Inner Lens -->
  <circle cx="58" cy="60" r="22" fill="#1a1a2e" stroke="#00d4ff" stroke-width="6"/>
  <!-- Center Dot -->
  <circle cx="58" cy="60" r="8" fill="#00d4ff"/>

  <!-- Career Path Lines -->
  <path d="M35 45 L50 35 L65 50" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <path d="M32 75 L48 85 L70 68" stroke="#667eea" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>

    <!-- ======================== -->
  <!-- ICON SECTION -->
  <!-- ======================== -->

  <!-- Outer lens ring -->
  <circle
    cx="60"
    cy="58"
    r="40"
    fill="none"
    stroke="url(#lensGradient)"
    stroke-width="10"
    filter="url(#glow)"
  />

  <!-- Inner dark circle -->
  <circle
    cx="60"
    cy="58"
    r="24"
    fill="#0f0f1a"
    stroke="#00d4ff"
    stroke-width="5"
  />

  <!-- Center bright dot -->
  <circle
    cx="60"
    cy="58"
    r="7"
    fill="#00d4ff"
    filter="url(#glow)"
  />

  <!-- Upward arrow path inside lens -->
  <polyline
    points="50,66 60,46 70,66"
    fill="none"
    stroke="#667eea"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Handle of lens (bottom right diagonal) -->
  <line
    x1="90"
    y1="90"
    x2="108"
    y2="108"
    stroke="url(#lensGradient)"
    stroke-width="10"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- ======================== -->
  <!-- TEXT SECTION -->
  <!-- ======================== -->

  <!-- "Career" text (dark solid color) -->
  <text
    x="115"
    y="68"
    font-family="Inter, Poppins, sans-serif"
    font-size="44"
    font-weight="800"
    fill="#1e293b"
    letter-spacing="-2"
  >Career</text>

  <!-- "Lens" text (gradient color) -->
  <text
    x="270"
    y="68"
    font-family="Inter, Poppins, sans-serif"
    font-size="44"
    font-weight="800"
    fill="url(#lensGradient)"
    letter-spacing="-2"
    filter="url(#textGlow)"
  >Lens</text>

  <!-- Tagline -->
  <text x="118" y="92" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#64748b" letter-spacing="2.5px">
    AI CAREER INTELLIGENCE
  </text>
</svg>